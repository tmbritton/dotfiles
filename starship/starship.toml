# starship prompt config
# docs: https://starship.rs/config/

# Two-line prompt: info on top, clean arrow below.
format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$elixir\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo  = true
style             = "bold cyan"
# format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
style  = "bold purple"
format = "on [$symbol$branch]($style) "

[git_status]
style    = "bold yellow"
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?${count}"
stashed    = "\\$"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[cmd_duration]
min_time = 2000
format   = "took [$duration](bold yellow) "

[nodejs]
format = "via [⬢ $version](bold green) "

[python]
format = "via [🐍 $version](bold yellow) "

[elixir]
format = "via [💧 $version](bold purple) "

[rust]
format = "via [🦀 $version](bold red) "

[golang]
format = "via [🐹 $version](bold cyan) "

# disable some defaults that add noise
[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true
